<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PiPER 关节零偏标定审核</title>
  <style>
    :root{color-scheme:dark;--bg:#081018;--panel:#101b25;--panel2:#14232e;--line:#294255;--text:#e7f0f5;--muted:#8fa5b4;--good:#55d99b;--bad:#ff737d;--warn:#efb95e;--nom:#778f9f;--cal:#54bfff;--violet:#b78cff;--mono:ui-monospace,SFMono-Regular,Consolas,monospace}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,sans-serif}header{min-height:82px;padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:18px;align-items:center}h1,h2,h3,p{margin-top:0}h1{font-size:21px;margin-bottom:4px}h2{font-size:15px;margin-bottom:14px}h3{font:700 11px var(--mono);color:var(--muted);text-transform:uppercase}.sub,.muted{color:var(--muted)}.status{border:1px solid var(--line);padding:9px 12px;border-radius:6px;font:700 12px var(--mono)}.status.good{border-color:var(--good);color:var(--good)}.status.bad{border-color:var(--bad);color:var(--bad)}.shell{max-width:1580px;margin:0 auto;padding:16px}.safety-strip{display:grid;grid-template-columns:repeat(8,minmax(110px,1fr));gap:8px;margin-bottom:12px}.safety{border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:10px;min-height:62px}.safety span{display:block;color:var(--muted);font:10px var(--mono);text-transform:uppercase}.safety b{display:block;margin-top:6px;font:700 12px var(--mono)}.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.grid{display:grid;grid-template-columns:minmax(500px,1.35fr) minmax(380px,1fr);gap:12px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:15px;min-width:0}.left,.right{display:grid;gap:12px;align-content:start}.offsets{display:grid;gap:9px}.offset-row{display:grid;grid-template-columns:minmax(90px,140px) minmax(220px,1fr) 178px;gap:10px;align-items:center}.joint{font:12px var(--mono);overflow-wrap:anywhere}.offset-track{position:relative;height:17px;background:#091219;border:1px solid #223846;border-radius:3px;overflow:hidden}.offset-track:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;background:#7690a0}.offset-bar{position:absolute;top:3px;height:9px;border-radius:2px;background:var(--cal)}.offset-value{text-align:right;font:12px var(--mono)}table{border-collapse:collapse;width:100%;table-layout:fixed;font:12px var(--mono)}th,td{text-align:right;padding:8px 7px;border-bottom:1px solid #253947;overflow-wrap:anywhere}th{color:var(--muted);font-weight:500}th:first-child,td:first-child{text-align:left}.metric-pass{color:var(--good)}.metric-fail{color:var(--bad)}.obs-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px}.obs-card{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:10px}.obs-card span{display:block;color:var(--muted);font:10px var(--mono)}.obs-card b{display:block;font:16px var(--mono);margin-top:5px}.singular-list{display:grid;gap:7px}.singular-row{display:grid;grid-template-columns:35px 1fr 120px;gap:8px;align-items:center;font:11px var(--mono)}.singular-track{height:10px;background:#091219;border:1px solid #223846}.singular-bar{height:100%;background:var(--violet)}.issues{margin:0;padding:0;list-style:none;display:grid;gap:7px}.issue{border-left:3px solid var(--bad);background:#1b171b;padding:8px 10px;color:#e5cfd2;font:12px var(--mono);overflow-wrap:anywhere}.issue.warn{border-color:var(--warn);color:#e7dac2}.clear{border-left-color:var(--good);background:#102019;color:var(--good)}.details{display:grid;grid-template-columns:145px 1fr;gap:7px 10px;font:12px var(--mono)}.details dt{color:var(--muted)}.details dd{margin:0;overflow-wrap:anywhere}.fatal{margin:18px;border:1px solid var(--bad);background:#1c1216;color:#ffd4d8;padding:16px;border-radius:8px;white-space:pre-wrap}.legend{display:flex;gap:18px;color:var(--muted);font:11px var(--mono);margin-top:10px}.swatch{display:inline-block;width:14px;height:3px;margin-right:5px;vertical-align:middle}.provisional{margin:12px 0 0;border-left:3px solid var(--warn);padding:8px 10px;background:#1b1912;color:#dccba9}.hidden{display:none!important}@media(max-width:1180px){.safety-strip{grid-template-columns:repeat(4,1fr)}.grid{grid-template-columns:1fr}}@media(max-width:700px){header{align-items:flex-start;flex-direction:column}.safety-strip{grid-template-columns:repeat(2,1fr)}.offset-row{grid-template-columns:95px 1fr}.offset-value{grid-column:2}.obs-summary{grid-template-columns:1fr}.shell{padding:9px}.quality-wrap{overflow-x:auto}table{min-width:650px}}
  </style>
</head>
<body>
  <header>
    <div><h1>PiPER 关节零偏标定审核</h1><div class="sub">离线报告 · 仅供人工复核 · 不写 URDF · 不发送运动命令</div></div>
    <div id="status" class="status">载入中…</div>
  </header>
  <main id="app" class="shell hidden">
    <section id="safety-strip" class="safety-strip" aria-label="安全字段"></section>
    <div class="grid">
      <div class="left">
        <section class="panel">
          <h2>6 关节零偏</h2>
          <div id="offsets" class="offsets"></div>
          <div class="legend"><span><i class="swatch" style="background:var(--cal)"></i>估计零偏</span><span>中心线 = 0 rad</span></div>
        </section>
        <section class="panel">
          <h2>Nominal vs calibrated · train / held-out</h2>
          <div class="quality-wrap"><table>
            <thead><tr><th>数据集 / 指标</th><th>Nominal</th><th>Calibrated</th><th>变化</th><th>审核上限</th></tr></thead>
            <tbody id="quality-body"></tbody>
          </table></div>
        </section>
      </div>
      <div class="right">
        <section class="panel">
          <h2>可观测性</h2>
          <div id="obs-summary" class="obs-summary"></div>
          <h3>Jacobian singular values</h3>
          <div id="singular-list" class="singular-list"></div>
        </section>
        <section class="panel">
          <h2>失败原因 / 审核阻塞</h2>
          <ul id="issues" class="issues"></ul>
        </section>
        <section class="panel">
          <h2>报告溯源</h2>
          <dl id="details" class="details"></dl>
          <p id="caveat" class="provisional"></p>
        </section>
      </div>
    </div>
  </main>
  <div id="fatal" class="fatal hidden"></div>
  <script>
  "use strict";
  const $=id=>document.getElementById(id),clear=n=>{while(n.firstChild)n.removeChild(n.firstChild)},el=(tag,cls,text)=>{const n=document.createElement(tag);if(cls)n.className=cls;if(text!==undefined)n.textContent=String(text);return n};
  const finite=v=>typeof v==='number'&&Number.isFinite(v),deg=v=>finite(v)?`${(v*180/Math.PI).toFixed(4)}°`:'—',rad=v=>finite(v)?`${v.toFixed(7)} rad`:'—',mm=v=>finite(v)?`${(v*1000).toFixed(3)} mm`:'—',angle=v=>finite(v)?`${(v*180/Math.PI).toFixed(3)}°`:'—',sci=v=>finite(v)?v.toExponential(4):'—';
  function safetyItem(root,label,value,good){const box=el('div','safety'),name=el('span','',label),shown=typeof value==='boolean'?(value?'TRUE':'FALSE'):value===null||value===undefined?'UNKNOWN':String(value),ok=value===good;box.append(name,el('b',ok?'good':value===null||value===undefined?'warn':'bad',shown));root.append(box)}
  function renderSafety(d){const root=$('safety-strip'),p=d.provenance||{};clear(root);safetyItem(root,'Read only',d.read_only,true);safetyItem(root,'Motion commands',d.motion_commands_published,0);safetyItem(root,'URDF modified',d.urdf_modified,false);safetyItem(root,'Independent dataset',p.independent_dataset_verified,true);safetyItem(root,'Passive capture',p.read_only_capture_evidence_verified,true);safetyItem(root,'Manual review ready',d.ready_for_manual_review,true);safetyItem(root,'Optimizer success',d.optimizer?.success,true);safetyItem(root,'Observability',d.observability?.passes,true);safetyItem(root,'Held-out quality',d.quality?.validation_passes,true);safetyItem(root,'Offsets in bounds',d.quality?.offsets_inside_review_bounds,true)}
  function renderOffsets(d){const root=$('offsets');clear(root);const names=Array.isArray(d.joint_names)?d.joint_names:[],values=Array.isArray(d.joint_zero_offsets_rad)?d.joint_zero_offsets_rad:[],uncertainty=Array.isArray(d.observability?.linearized_standard_deviation_rad)?d.observability.linearized_standard_deviation_rad:[],bound=finite(d.optimizer?.max_abs_offset_rad)&&d.optimizer.max_abs_offset_rad>0?d.optimizer.max_abs_offset_rad:Math.max(...values.map(v=>Math.abs(v)).filter(finite),1);if(!values.length){root.append(el('div','muted','零偏数组不可用；请查看失败原因。'));return}values.forEach((value,index)=>{const row=el('div','offset-row'),track=el('div','offset-track'),bar=el('i','offset-bar'),ratio=Math.max(-1,Math.min(1,value/bound)),sigma=uncertainty[index];bar.style.left=ratio<0?`${50+ratio*50}%`:'50%';bar.style.width=`${Math.abs(ratio)*50}%`;bar.style.background=Math.abs(ratio)>=.98?'var(--bad)':'var(--cal)';track.append(bar);row.append(el('div','joint',names[index]||`joint${index+1}`),track,el('div','offset-value',`${rad(value)} · ${deg(value)}${finite(sigma)?` · ±${deg(sigma)}`:''}`));root.append(row)})}
  function metric(q,key,kind){return q&&q[key]!==undefined?q[key]:null}
  function improvement(nominal,calibrated){if(!finite(nominal)||!finite(calibrated)||nominal===0)return '—';const change=(nominal-calibrated)/nominal*100;return `${change>=0?'↓':'↑'} ${Math.abs(change).toFixed(1)}%`}
  function qualityRow(root,label,nominal,calibrated,limit,format,heldOut){const row=el('tr'),passes=!heldOut||!finite(limit)||finite(calibrated)&&calibrated<=limit;row.append(el('td','',label),el('td','',format(nominal)),el('td',passes?'metric-pass':'metric-fail',format(calibrated)),el('td',finite(nominal)&&finite(calibrated)&&calibrated<=nominal?'metric-pass':'metric-fail',improvement(nominal,calibrated)),el('td','',finite(limit)?format(limit):'—'));root.append(row)}
  function renderQuality(d){const root=$('quality-body');clear(root);const q=d.quality||{},lim=d.quality_limits||{},nt=q.nominal_training||{},ct=q.calibrated_training||{},nv=q.nominal_validation||{},cv=q.calibrated_validation||{};qualityRow(root,'Train · translation RMSE',metric(nt,'translation_rmse_m'),metric(ct,'translation_rmse_m'),null,mm,false);qualityRow(root,'Train · rotation RMSE',metric(nt,'rotation_rmse_rad'),metric(ct,'rotation_rmse_rad'),null,angle,false);qualityRow(root,'Held-out · translation RMSE',metric(nv,'translation_rmse_m'),metric(cv,'translation_rmse_m'),lim.max_validation_translation_rmse_m,mm,true);qualityRow(root,'Held-out · rotation RMSE',metric(nv,'rotation_rmse_rad'),metric(cv,'rotation_rmse_rad'),lim.max_validation_rotation_rmse_rad,angle,true)}
  function obsCard(root,label,value,cls){const card=el('div','obs-card');card.append(el('span','',label),el('b',cls||'',value));root.append(card)}
  function renderObservability(d){const o=d.observability||{},summary=$('obs-summary'),list=$('singular-list');clear(summary);clear(list);const rankOk=finite(o.rank)&&finite(o.required_rank)&&o.rank===o.required_rank,excitationOk=finite(o.joint_excitation_rank)&&finite(o.joint_excitation_required_rank)&&o.joint_excitation_rank===o.joint_excitation_required_rank,conditionOk=finite(o.condition)&&finite(o.max_condition)&&o.condition<=o.max_condition;obsCard(summary,'Pose Jacobian rank',finite(o.rank)?`${o.rank} / ${o.required_rank??'—'}`:'—',rankOk?'good':'bad');obsCard(summary,'Joint excitation rank',finite(o.joint_excitation_rank)?`${o.joint_excitation_rank} / ${o.joint_excitation_required_rank??'—'}`:'—',excitationOk?'good':'bad');obsCard(summary,'Condition / max',`${sci(o.condition)} / ${sci(o.max_condition)}`,conditionOk?'good':'bad');const values=Array.isArray(o.singular_values)?o.singular_values.filter(finite):[],max=Math.max(...values,1e-12);if(!values.length){list.append(el('div','muted','Singular values unavailable.'));return}values.forEach((value,index)=>{const row=el('div','singular-row'),track=el('div','singular-track'),bar=el('div','singular-bar');bar.style.width=`${Math.max(1,100*Math.sqrt(Math.max(value,0)/max))}%`;track.append(bar);row.append(el('span','',`σ${index+1}`),track,el('span','',sci(value)));list.append(row)})}
  function addIssue(root,text,kind=''){root.append(el('li',`issue ${kind}`,text))}
  function renderIssues(d){const root=$('issues');clear(root);let count=0;if(d.error){addIssue(root,d.error);count++}if(d.optimizer&&d.optimizer.success!==true){addIssue(root,`Optimizer failed: ${d.optimizer.message||'no message recorded'}`);count++}const o=d.observability||{};if(o.passes!==true){addIssue(root,`Observability failed: rank ${o.rank??'—'}/${o.required_rank??'—'}, condition ${sci(o.condition)} (max ${sci(o.max_condition)}).`);count++}if(finite(o.joint_excitation_rank)&&o.joint_excitation_rank!==o.joint_excitation_required_rank){addIssue(root,`Joint excitation failed: rank ${o.joint_excitation_rank}/${o.joint_excitation_required_rank}.`);count++}const q=d.quality||{},p=d.provenance||{};if(q.validation_passes!==true){addIssue(root,'Held-out validation failed or was not produced; inspect nominal/calibrated RMSE and limits.');count++}if(q.offsets_inside_review_bounds!==true){addIssue(root,'One or more fitted offsets reached the manual-review bound.');count++}if(p.independent_dataset_verified!==true){addIssue(root,'Dataset independence was not verified against hand-eye and mount inputs.');count++}if(p.read_only_capture_evidence_verified!==true){addIssue(root,'Passive camera/CAN zero-TX capture evidence is missing.');count++}if(d.read_only!==true||d.motion_commands_published!==0||d.urdf_modified!==false){addIssue(root,'Safety provenance is not valid.','');count++}if(d.ready_for_manual_review!==true&&!count){addIssue(root,'Report is not ready for manual review, but no specific gate reason was recorded.','warn');count++}if(!count)addIssue(root,'All recorded solver gates passed. Physical low-speed validation is still required.','clear')}
  function addDetail(root,label,value){root.append(el('dt','',label),el('dd','',value===undefined||value===null?'—':value))}
  function renderDetails(d){const root=$('details'),p=d.provenance||{};clear(root);addDetail(root,'Calibration ID',d.calibration_id);addDetail(root,'Samples',d.sample_count);addDetail(root,'Train / held-out',`${d.training_indices?.length??'—'} / ${d.validation_indices?.length??'—'}`);addDetail(root,'Evaluations',d.optimizer?.evaluations);addDetail(root,'Optimizer status',d.optimizer?.status);addDetail(root,'Optimizer cost',finite(d.optimizer?.cost)?sci(d.optimizer.cost):'—');addDetail(root,'Input SHA256',d.input_sha256);addDetail(root,'Dataset SHA256',p.dataset_sha256);addDetail(root,'Hand-eye source',p.hand_eye_dataset_sha256);addDetail(root,'Mount source',p.mount_dataset_sha256);$('caveat').textContent=d.caveat||'Provisional result: physical validation is required before any application.'}
  function render(d){const ready=d.ready_for_manual_review===true,status=$('status');status.textContent=ready?'PASS · 可进入人工复核':'BLOCKED · 不可应用';status.className=`status ${ready?'good':'bad'}`;renderSafety(d);renderOffsets(d);renderQuality(d);renderObservability(d);renderIssues(d);renderDetails(d);$('app').classList.remove('hidden')}
  function fail(error){$('status').textContent='ERROR';$('status').className='status bad';$('fatal').textContent=error instanceof Error?error.message:String(error);$('fatal').classList.remove('hidden')}
  fetch('/api/report',{cache:'no-store',credentials:'same-origin'}).then(response=>{if(!response.ok)throw Error(`HTTP ${response.status}`);return response.json()}).then(render).catch(fail);
  </script>
</body>
</html>
